name: TalkInk
options:
  bundleIdPrefix: com.carlandrews
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: LMN6CD96GK
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  TalkInk:
    type: application
    platform: iOS
    sources:
      - path: TalkInk
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.carlandrews.talkink
        INFOPLIST_FILE: TalkInk/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: TalkInk/Resources/TalkInk.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
    entitlements:
      path: TalkInk/Resources/TalkInk.entitlements

  TalkInkWatch:
    type: application
    platform: watchOS
    sources:
      - path: TalkInkWatch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.carlandrews.talkink.watchkitapp
        INFOPLIST_FILE: TalkInkWatch/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: TalkInkWatch/Resources/TalkInkWatch.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - target: TalkInk
        embed: false
