name: TalkInk
options:
  bundleIdPrefix: com.carlandrews
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  xcodeVersion: "26.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "LMN6CD96GK"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
    CLANG_WARN_COMMA: YES
    CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: YES
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
    CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
    CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
    CLANG_WARN_STRICT_PROTOTYPES: YES
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    ENABLE_STRICT_OBJC_MSGSEND: YES
    GCC_NO_COMMON_BLOCKS: YES

schemes:
  TalkInk:
    build:
      targets:
        TalkInk: all
    run:
      config: Debug
  TalkInkWatch:
    build:
      targets:
        TalkInkWatch: all
    run:
      config: Debug

targets:
  TalkInk:
    type: application
    platform: iOS
    sources:
      - path: TalkInk
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.carlandrews.talkink
        INFOPLIST_FILE: TalkInk/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: TalkInk/Resources/TalkInk.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
    entitlements:
      path: TalkInk/Resources/TalkInk.entitlements
    dependencies:
      - target: TalkInkWatch

  TalkInkWatch:
    type: application
    platform: watchOS
    sources:
      - path: TalkInkWatch
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.carlandrews.talkink.watchkitapp
        INFOPLIST_FILE: TalkInkWatch/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: TalkInkWatch/Resources/TalkInkWatch.entitlements
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "4"
    dependencies:
      - target: TalkInkWatchWidgets

  TalkInkWatchWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - path: TalkInkWatchWidgets
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.carlandrews.talkink.watchkitapp.widgets
        INFOPLIST_FILE: TalkInkWatchWidgets/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "4"
        SWIFT_EMIT_LOC_STRINGS: YES
