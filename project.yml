name: TalkInk
options:
  bundleIdPrefix: com.carlandrews
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  xcodeVersion: "26.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "LMN6CD96GK"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

schemes:
  TalkInk:
    build:
      targets:
        TalkInk: all
    run:
      config: Debug
  TalkInkWatch:
    build:
      targets:
        TalkInkWatch: all
    run:
      config: Debug

targets:
  TalkInk:
    type: application
    platform: iOS
    sources:
      - path: TalkInk
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.carlandrews.talkink
        INFOPLIST_FILE: TalkInk/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: TalkInk/Resources/TalkInk.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
    entitlements:
      path: TalkInk/Resources/TalkInk.entitlements
    dependencies:
      - target: TalkInkWatch

  TalkInkWatch:
    type: application
    platform: watchOS
    sources:
      - path: TalkInkWatch
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.carlandrews.talkink.watchkitapp
        INFOPLIST_FILE: TalkInkWatch/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: TalkInkWatch/Resources/TalkInkWatch.entitlements
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "4"
